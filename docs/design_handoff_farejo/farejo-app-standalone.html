  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ly: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e0f8cd31-3938-4b18-865f-523dd44f6d5c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e06f67f4-5168-4722-a21d-6cec7e3548cf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#fbfaf7;font-family:'Hanken Grotesk',system-ui,sans-serif;color:#12140f}\na{color:#1c7a4d}\ninput{font-family:inherit;outline:none}\ninput::placeholder{color:#9a9d94}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n  <!-- NAV -->\n  <div style=\"border-bottom:1px solid #ece9e2;background:#fff;position:sticky;top:0;z-index:5\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"display:flex;align-items:center;gap:44px\">\n        <div sc-camel-on-click=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer\">\n          <img src=\"c2f0b994-9cfe-43e9-9740-feea72e075b4\" alt=\"farejô\" style=\"height:40px;width:auto;display:block;flex:none\">\n          <span style=\"font:700 23px/1 'Hanken Grotesk',sans-serif;letter-spacing:-.02em\">farejô<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:28px;font-size:15px;color:#4d5149\"><span sc-camel-on-click=\"{{ goHome }}\" style=\"cursor:pointer\">Lojas<\u002Fspan><span sc-camel-on-click=\"{{ goPlatforms }}\" style=\"cursor:pointer\">Plataformas<\u002Fspan><span sc-camel-on-click=\"{{ goHow }}\" style=\"cursor:pointer\">Como funciona<\u002Fspan><span sc-camel-on-click=\"{{ goFaq }}\" style=\"cursor:pointer\">FAQ<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;font-size:15px\"><span sc-camel-on-click=\"{{ goHome }}\" style=\"background:#1c7a4d;color:#fff;padding:11px 20px;border-radius:10px;font-weight:600;cursor:pointer\">Buscar loja<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== HOME ===== -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"flex:1\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:52px 40px 34px;width:100%;box-sizing:border-box\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:40px\">\n        <div style=\"max-width:720px\">\n          <div style=\"font:500 13px 'Geist Mono',monospace;color:#1c7a4d;letter-spacing:.06em;margin-bottom:16px\">COMPARE · ESCOLHA · ECONOMIZE<\u002Fdiv>\n          <div style=\"font:700 54px/1.04 'Hanken Grotesk',sans-serif;letter-spacing:-.025em\">Antes de comprar,<br>veja quem paga mais cashback.<\u002Fdiv>\n          <div style=\"margin-top:18px;font-size:18px;line-height:1.5;color:#5b5f56;max-width:560px\">farejô compara Méliuz, Cuponomia, MyCashback e outras plataformas em cada loja — e mostra a melhor na hora.<\u002Fdiv>\n          <div style=\"margin-top:28px;display:flex;background:#fff;border:1px solid #e7e5de;border-radius:14px;padding:7px 8px 7px 22px;align-items:center;max-width:560px;gap:12px;box-shadow:0 6px 24px -14px rgba(0,0,0,.25)\">\n            <span style=\"width:22px;height:22px;position:relative;flex:none\"><span style=\"position:absolute;top:0;left:0;width:14px;height:14px;border-radius:50%;border:2.5px solid #9a9d94\"><\u002Fspan><span style=\"position:absolute;top:15px;left:14px;width:9px;height:2.5px;border-radius:2px;background:#9a9d94;transform:rotate(45deg)\"><\u002Fspan><\u002Fspan>\n            <input value=\"{{ query }}\" sc-camel-on-input=\"{{ onSearch }}\" placeholder=\"Buscar loja — ex: Amazon, Shopee, Magalu…\" style=\"border:none;background:none;font-size:17px;flex:1;color:#12140f;min-width:0\">\n            <span style=\"background:#1c7a4d;color:#fff;padding:13px 26px;border-radius:10px;font-weight:600;font-size:16px;cursor:pointer\">Buscar<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:14px;flex:none\">\n          <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:16px;padding:20px 26px;text-align:center;min-width:150px\"><div style=\"font:600 40px 'Space Grotesk',sans-serif;color:#1c7a4d;letter-spacing:-.02em\">240+<\u002Fdiv><div style=\"font-size:14px;color:#8a8f84;margin-top:4px\">lojas<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:16px;padding:20px 26px;text-align:center;min-width:150px\"><div style=\"font:600 40px 'Space Grotesk',sans-serif;color:#1c7a4d;letter-spacing:-.02em\">12<\u002Fdiv><div style=\"font-size:14px;color:#8a8f84;margin-top:4px\">plataformas<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:1160px;margin:0 auto;padding:4px 40px 64px;width:100%;box-sizing:border-box\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap\">\n        <div style=\"font:700 24px 'Hanken Grotesk',sans-serif;letter-spacing:-.02em\">{{ resultsLabel }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n          <span style=\"font-size:13px;color:#9a9d94\">Ordenar por<\u002Fspan>\n          <div style=\"display:flex;gap:6px\">\n            <sc-for list=\"{{ sortOpts }}\" as=\"o\" hint-placeholder-count=\"3\">\n              <span sc-camel-on-click=\"{{ o.onClick }}\" style=\"font-size:14px;padding:8px 15px;border-radius:100px;cursor:pointer;background:{{ o.bg }};color:{{ o.fg }};border:{{ o.border }};font-weight:{{ o.fw }}\">{{ o.label }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <span style=\"width:1px;height:22px;background:#e0ddd4\"><\u002Fspan>\n          <span sc-camel-on-click=\"{{ toggleInter }}\" style=\"display:flex;align-items:center;gap:9px;cursor:pointer\" title=\"Ajusta as taxas que dependem de ter conta no Inter\">\n            <span style=\"width:38px;height:22px;border-radius:100px;background:{{ togBg }};position:relative;transition:background .15s;flex:none\"><span style=\"position:absolute;top:3px;left:{{ togX }};width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)\"><\u002Fspan><\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:{{ togText }}\">Correntista Inter<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ catLoading }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n          <sc-for list=\"{{ skeleton }}\" as=\"sk\" hint-placeholder-count=\"6\">\n            <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:16px;padding:18px 20px\">\n              <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:16px\">\n                <span style=\"width:44px;height:44px;border-radius:12px;background:#eeece5;flex:none\"><\u002Fspan>\n                <div style=\"flex:1\"><div style=\"width:60%;height:14px;border-radius:6px;background:#eeece5;margin-bottom:8px\"><\u002Fdiv><div style=\"width:40%;height:11px;border-radius:6px;background:#f2f0e9\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"width:48px;height:24px;border-radius:6px;background:#eeece5\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height:1px;background:#f4f2eb;margin-bottom:14px\"><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:14px\">\n                <div style=\"height:12px;border-radius:6px;background:#f2f0e9\"><\u002Fdiv>\n                <div style=\"height:12px;border-radius:6px;background:#f2f0e9;width:86%\"><\u002Fdiv>\n                <div style=\"height:12px;border-radius:6px;background:#f2f0e9;width:68%\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ catError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:58px 24px;border:1px solid #f0d9d3;background:#fbf3f0;border-radius:18px\">\n          <div style=\"width:52px;height:52px;border-radius:50%;background:#f2d6cc;color:#b5502f;display:flex;align-items:center;justify-content:center;font:700 26px 'Space Grotesk',sans-serif;margin:0 auto 14px\">!<\u002Fdiv>\n          <div style=\"font:600 20px 'Hanken Grotesk',sans-serif;color:#12140f;letter-spacing:-.01em\">Não foi possível carregar as lojas<\u002Fdiv>\n          <div style=\"font-size:15px;color:#95685c;margin-top:6px;max-width:420px;margin-left:auto;margin-right:auto\">Houve um erro de conexão ao buscar as ofertas. Verifique sua internet e tente de novo.<\u002Fdiv>\n          <span sc-camel-on-click=\"{{ retry }}\" style=\"display:inline-block;margin-top:18px;font-size:14.5px;font-weight:600;color:#fff;background:#1c7a4d;cursor:pointer;padding:11px 22px;border-radius:10px\">Tentar novamente<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ catDown }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:58px 24px;border:1px dashed #d8d5cc;background:#faf9f5;border-radius:18px\">\n          <div style=\"width:52px;height:52px;border-radius:50%;background:#eeece5;color:#8a8f84;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 14px\">⏸<\u002Fdiv>\n          <div style=\"font:600 20px 'Hanken Grotesk',sans-serif;color:#12140f;letter-spacing:-.01em\">Catálogo temporariamente indisponível<\u002Fdiv>\n          <div style=\"font-size:15px;color:#8a8f84;margin-top:6px;max-width:470px;margin-left:auto;margin-right:auto\">Estamos atualizando as ofertas das plataformas. O catálogo volta em instantes — tente de novo daqui a pouco.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ catOk }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n        <sc-for list=\"{{ homeStores }}\" as=\"s\" hint-placeholder-count=\"9\">\n          <div sc-camel-on-click=\"{{ s.open }}\" style=\"background:#fff;border:1px solid #ece9e2;border-radius:16px;padding:18px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s\" style-hover=\"border-color:#c9d8cd;box-shadow:0 10px 30px -18px rgba(0,0,0,.25)\">\n            <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:16px\">\n              <span style=\"width:44px;height:44px;border-radius:12px;background:{{ s.tileBg }};display:flex;align-items:center;justify-content:center;font:700 18px 'Hanken Grotesk',sans-serif;color:{{ s.tileColor }};border:{{ s.tileBorder }};box-sizing:border-box;flex:none\">{{ s.m }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\"><div style=\"font-weight:600;font-size:17px\">{{ s.n }}<\u002Fdiv><div style=\"font-size:12.5px;color:#9a9d94\">{{ s.count }} plataformas<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font:600 26px 'Space Grotesk',sans-serif;color:#1c7a4d;letter-spacing:-.02em\">{{ s.bestR }}<\u002Fdiv><div style=\"font-size:11px;color:#9a9d94\">melhor<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ s.top }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:8px 0;border-to olor:{{ p.fg }};flex:none\">{{ p.m }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\"><span style=\"font-weight:600;font-size:17px\">{{ p.p }}<\u002Fspan><sc-if value=\"{{ p.best }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:500 9.5px 'Geist Mono',monospace;color:#1c7a4d;background:#e7f4ec;padding:3px 7px;border-radius:5px;letter-spacing:.03em\">MELHOR<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:600 9.5px 'Geist Mono',monospace;color:{{ p.badgeFg }};background:{{ p.badgeBg }};padding:3px 7px;border-radius:5px;letter-spacing:.03em\">{{ p.badge }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ p.stale }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;gap:3px;font:600 9.5px 'Geist Mono',monospace;color:#9a7b2e;background:#f6efda;padding:3px 7px;border-radius:5px;letter-spacing:.02em\">⏱ ATRASADO<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n            <div style=\"font-size:13px;color:#8a8f84;margin-top:3px\">{{ p.note }}<sc-if value=\"{{ p.hasPrev }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#b3b0a6\"> · antes <span style=\"text-decoration:line-through\">{{ p.prevR }}<\u002Fspan><\u002Fspan><\u002Fsc-if><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:600 28px 'Space Grotesk',sans-serif;color:{{ p.color }};letter-spacing:-.02em;min-width:70px;text-align:right\">{{ p.r }}<\u002Fspan>\n          <span tabindex=\"0\" title=\"Abre a plataforma em uma nova aba\" style=\"background:{{ p.btnBg }};color:{{ p.btnFg }};border:1px solid {{ p.btnBorder }};padding:11px 18px;border-radius:10px;font-weight:600;font-size:14.5px;cursor:pointer;white-space:nowrap;flex:none;display:inline-flex;align-items:center;gap:6px\" style-focus=\"outline:2px solid #1c7a4d;outline-offset:2px\">Ativar <span style=\"font-size:13px\">↗<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:24px;background:#f6f5f0;border-radius:14px;padding:18px 22px;font-size:13.5px;color:#8a8f84;line-height:1.5\">Os percentuais são informativos e podem variar por categoria de produto e condições de cada plataforma. O botão <b style=\"color:#5b5f56;font-weight:600\">Ativar ↗<\u002Fb> abre a plataforma escolhida em uma nova aba para redirecionar você à loja.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- HISTÓRICO -->\n    <div style=\"margin-top:44px;display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px\">\n      <div style=\"font:700 22px 'Hanken Grotesk',sans-serif;letter-spacing:-.02em\">Histórico<\u002Fdiv>\n      <sc-if value=\"{{ hasAnyHist }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:13px;color:#8a8f84\">últimos 60 dias<\u002Fspan><\u002Fsc-if>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasHist }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:18px;padding:22px 24px\">\n        <div style=\"font:500 12px 'Geist Mono',monospace;color:#8a8f84;letter-spacing:.04em;margin-bottom:12px\">CASHBACK (%)<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px 20px;margin-bottom:16px\">\n          <sc-for list=\"{{ histLegend }}\" as=\"l\" hint-placeholder-count=\"3\">\n            <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#3d4039\"><span style=\"width:16px;height:3px;border-radius:2px;background:{{ l.color }};display:inline-block;flex:none\"><\u002Fspan>{{ l.plat }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div>{{ chartPct }}<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8a8f84;line-height:1.55;margin-top:14px;border-top:1px solid #f4f2eb;padding-top:14px\">{{ histSummary }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ hasHistR }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:18px;padding:22px 24px\">\n        <div style=\"font:500 12px 'Geist Mono',monospace;color:#8a8f84;letter-spacing:.04em;margin-bottom:12px\">CASHBACK EM REAIS · VALOR FIXO<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px 20px;margin-bottom:16px\">\n          <sc-for list=\"{{ histRLegend }}\" as=\"l\" hint-placeholder-count=\"1\">\n            <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#3d4039\"><span style=\"width:16px;height:3px;border-radius:2px;background:{{ l.color }};display:inline-block;flex:none\"><\u002Fspan>{{ l.plat }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div>{{ chartReais }}<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8a8f84;line-height:1.55;margin-top:14px;border-top:1px solid #f4f2eb;padding-top:14px\">{{ histRSummary }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noHist }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#faf9f5;border:1px dashed #ddd9cf;border-radius:18px;padding:32px 28px;text-align:center\">\n        <div style=\"font:600 17px 'Hanken Grotesk',sans-serif;color:#12140f\">Histórico sendo construído<\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#8a8f84;line-height:1.55;margin-top:6px;max-width:470px;margin-left:auto;margin-right:auto\">Ainda estamos coletando os valores de cashback desta loja. Assim que houver dados suficientes, o gráfico dos últimos 60 dias aparece aqui.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasOffers }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"margin-top:44px;font:600 15px 'Hanken Grotesk',sans-serif;color:#5b5f56;margin-bottom:14px\">Como funciona<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px\">\n      <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n .m }}<\u002Fspan>\n            <div style=\"min-width:0\"><div style=\"font-weight:600;font-size:18px\">{{ p.p }}<\u002Fdiv><div style=\"font-size:12.5px;color:#9a9d94\">em {{ p.stores }} lojas<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:14px;color:#5b5f56;line-height:1.5;margin-bottom:18px\">{{ p.note }}<\u002Fdiv>\n          <div style=\"display:flex;gap:10px\">\n            <div style=\"flex:1;background:#faf9f5;border:1px solid #f1efe8;border-radius:12px;padding:12px 14px\"><div style=\"font:600 22px 'Space Grotesk',sans-serif;color:#12140f;letter-spacing:-.02em\">{{ p.avg }}<\u002Fdiv><div style=\"font-size:11px;color:#9a9d94;margin-top:3px\">média por loja<\u002Fdiv><\u002Fdiv>\n            <div style=\"flex:1;background:#f2f9f5;border:1px solid #cfe7d9;border-radius:12px;padding:12px 14px\"><div style=\"font:600 22px 'Space Grotesk',sans-serif;color:#1c7a4d;letter-spacing:-.02em\">{{ p.max }}<\u002Fdiv><div style=\"font-size:11px;color:#8a8f84;margin-top:3px\">{{ p.maxLabel }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ p.isInter }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:inline-flex;align-items:center;gap:6px;margin-top:12px;font:600 10px 'Geist Mono',monospace;color:#c05f2b;background:#f6ece2;padding:4px 9px;border-radius:6px;letter-spacing:.03em\"><span style=\"width:5px;height:5px;border-radius:50%;background:#c05f2b\"><\u002Fspan>PARA CORRENTISTAS INTER<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== COMO FUNCIONA ===== -->\n  <sc-if value=\"{{ isHow }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1;max-width:900px;margin:0 auto;padding:56px 40px 72px;width:100%;box-sizing:border-box\">\n    <div style=\"font:500 13px 'Geist Mono',monospace;color:#1c7a4d;letter-spacing:.06em;margin-bottom:14px\">COMO FUNCIONA<\u002Fdiv>\n    <div style=\"font:700 46px/1.05 'Hanken Grotesk',sans-serif;letter-spacing:-.03em;margin-bottom:12px\">Farejar, comparar, receber.<\u002Fdiv>\n    <div style=\"font-size:18px;color:#5b5f56;max-width:600px;margin-bottom:44px\">O farejô não paga o cashback — ele mostra qual plataforma paga mais e te leva até lá. Três passos.<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:18px;padding:26px 30px;display:flex;gap:24px;align-items:flex-start\">\n          <span style=\"font:600 30px 'Space Grotesk',sans-serif;color:#1c7a4d;letter-spacing:-.02em;flex:none;width:56px\">{{ st.k }}<\u002Fspan>\n          <div><div style=\"font-weight:600;font-size:21px;margin-bottom:6px\">{{ st.t }}<\u002Fdiv><div style=\"font-size:16px;color:#5b5f56;line-height:1.55\">{{ st.d }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;background:#0d100e;border-radius:20px;padding:36px 40px;display:flex;align-items:center;gap:28px\">\n      <img src=\"4678b34d-6a18-4617-85d8-c311f111b420\" style=\"width:72px;height:72px;flex:none\">\n      <div style=\"flex:1\"><div style=\"font:700 26px 'Hanken Grotesk',sans-serif;letter-spacing:-.02em;color:#eef0ea\">Ficou com dúvida?<\u002Fdiv><div style=\"font-size:15px;color:#9aa197;margin-top:6px\">Veja como o cashback é pago e por que ele muda entre as plataformas.<\u002Fdiv><\u002Fdiv>\n      <span sc-camel-on-click=\"{{ goFaq }}\" style=\"background:#4ade9b;color:#08120c;padding:14px 26px;border-radius:11px;font-weight:700;font-size:16px;cursor:pointer;white-space:nowrap;flex:none\">Perguntas frequentes<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FAQ ===== -->\n  <sc-if value=\"{{ isFaq }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"flex:1;max-width:820px;margin:0 auto;padding:56px 40px 72px;width:100%;box-sizing:border-box\">\n    <div style=\"font:500 13px 'Geist Mono',monospace;color:#1c7a4d;letter-spacing:.06em;margin-bottom:14px\">PERGUNTAS FREQUENTES<\u002Fdiv>\n    <div style=\"font:700 46px/1.05 'Hanken Grotesk',sans-serif;letter-spacing:-.03em;margin-bottom:12px\">Como o cashback funciona no farejô<\u002Fdiv>\n    <div style=\"font-size:18px;color:#5b5f56;max-width:620px;margin-bottom:40px\">Resumo: <b style=\"color:#12140f\">quem paga o cashback são as plataformas<\u002Fb>, não o farejô. A gente só mostra qual delas paga mais em cada loja.<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border:1px solid #ece9e2;border-radius:16px;padding:24px 28px\">\n          <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:10px\">\n            <span style=\"font:600 15px 'Space Grotesk',sans-serif;color:#1c7a4d;flex:none\">P.<\u002Fspan>\n            <div style=\"font-weight:600;font-size:19px;letter-spacing:-.01em\">{{ f.q }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:16px;color:#5b5f56;line-height:1.6;padding-left:27px\">{{ f.a }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;background:#f2f9f5;border:1px solid #cfe7d9;border-radius:18px;padding:28px 32px;display:flex;align-items:center;gap:24px\">\n      <img src=\"9d99b7d8-c2bd-4461-aeca-4a3ddd082c27\" style=\"width:60px;height:60px;flex:none\">\n      <div style=\"flex:1\"><div style=\"font:700 22px 'Hanken Grotesk',sans-serif;letter-spacing:-.02em;color:#12140f\">Pronto pra economizar?<\u002Fdiv><div style=\"font-size:15px;color:#5b5f56;margin-top:5px\">Busque uma loja e veja a melhor plataforma na hora — sem cadastro.<\u002Fdiv><\u002Fdiv>\n      <span sc-camel-on-click=\"{{ goHome }}\" style=\"background:#1c7a4d;color:#fff;padding:14px 26px;border-radius:11px;font-weight:600;font-size:16px;cursor:pointer;white-space:nowrap;flex:none\">Buscar loja<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FOOTER ===== -->\n  <div style=\"background:#0d100e;color:#9aa197;margin-top:auto\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:48px 40px 40px;display:flex;justify-content:space-between;gap:40px;flex-wrap:wrap\">\n      <div style=\"max-width:300px\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\"><img src=\"3ff7ed7d-4939-4805-a7ef-cfa891848943\" style=\"height:38px;width:auto;display:block\"><span style=\"font:700 22px/1 'Hanken Grotesk',sans-serif;letter-spacing:-.02em;color:#eef0ea\">farejô<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:14px;line-height:1.55\">Nada passa batido, nem um bom cashback. Compare as plataformas antes de comprar.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:60px;flex-wrap:wrap\">\n        <div><div style=\"font-weight:600;font-size:14px;color:#eef0ea;margin-bottom:14px\">Produto<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><span sc-camel-on-click=\"{{ goHome }}\" style=\"cursor:pointer\">Lojas<\u002Fspan><span sc-camel-on-click=\"{{ goPlatforms }}\" style=\"cursor:pointer\">Plataformas<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-weight:600;font-size:14px;color:#eef0ea;margin-bottom:14px\">Ajuda<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><span sc-camel-on-click=\"{{ goHow }}\" style=\"cursor:pointer\">Como funciona<\u002Fspan><span sc-camel-on-click=\"{{ goFaq }}\" style=\"cursor:pointer\">FAQ<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,.08)\">\n      <div style=\"max-width:1160px;margin:0 auto;padding:14px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n        <span style=\"font:500 11px 'Geist Mono',monospace;color:#5f6560;letter-spacing:.06em\">HANDOFF · ESTADOS DO CATÁLOGO<\u002Fspan>\n        <div style=\"display:flex;gap:6px;flex-wrap:wrap\">\n          <sc-for list=\"{{ catStates }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <span sc-camel-on-click=\"{{ c.onClick }}\" style=\"font-size:12.5px;padding:5px 12px;border-radius:100px;cursor:pointer;background:{{ c.bg }};color:{{ c.fg }};border:1px solid {{ c.border }}\">{{ c.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,.08)\"><div style=\"max-width:1160px;margin:0 auto;padding:20px 40px;font-size:13px;color:#7f867c\">© {{ year }} farejô · os percentuais são informativos e podem variar por plataforma.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view: 'home', query: '', sel: 0, inter: false, sort: 'plats', page: 1, histSel: null, catState: 'loading' };\n\n  componentDidMount() {\n    try {\n      if (localStorage.getItem('farejo_inter') === '1') this.setState({ inter: true });\n    } catch (e) {}\n    this._loadTimer = setTimeout(() => this.setState({ catState: 'ok' }), 850);\n  }\n\n  componentWillUnmount() { clearTimeout(this._loadTimer); }\n\n  loadCatalog() {\n    clearTimeout(this._loadTimer);\n    this.setState({ catState: 'loading' });\n    this._loadTimer = setTimeout(() => this.setState({ catState: 'ok' }), 850);\n  }\n\n  // Gráfico de linha em degraus (SVG). Usado só para dados reais de histórico.\n  buildChart(chartId, series, days, currency) {\n    const R = React.createElement;\n    const W = 720, H = 240, padL = 46, padR = 16, padT = 18, padB = 30;\n    const plotW = W - padL - padR, plotH = H - padT - padB;\n    let max = 0; series.forEach(s => s.values.forEach(v => { if (v != null && v > max) max = v; }));\n    max = max <= 0 ? 1 : max * 1.15;\n    const n = days.length;\n    const X = i => padL + (n === 1 ? 0 : (i / (n - 1)) * plotW);\n    const Y = v => padT + plotH * (1 - v / max);\n    const fmtV = v => currency ? (currency + ' ' + Math.round(v)) : ((Number.isInteger(v) ? v : String(v).replace('.', ',')) + '%');\n    const sel = this.state.histSel;\n    const k = [];\n    for (let g = 0; g <= 4; g++) {\n      const val = max * g / 4, yy = Y(val);\n      k.push(R('line', { key: 'g' + g, x1: padL, y1: yy, x2: W - padR, y2: yy, stroke: '#efece4', strokeWidth: 1 }));\n      k.push(R('text', { key: 'gl' + g, x: padL - 8, y: yy + 4, textAnchor: 'end', fontSize: 10, fill: '#b3b0a6', fontFamily: 'Geist Mono, monospace' }, fmtV(Math.round(val * 10) / 10)));\n    }\n    [0, Math.floor((n - 1) / 2), n - 1].forEach((i, kk) => {\n      k.push(R('text', { key: 'x' + kk, x: X(i), y: H - 9, textAnchor: i === 0 ? 'start' : (i === n - 1 ? 'end' : 'middle'), fontSize: 10, fill: '#b3b0a6', fontFamily: 'Geist Mono, monospace' }, days[i]));\n    });\n    series.forEach((s, si) => {\n      let d = '', started = false, prevY = null;\n      s.values.forEach((v, i) => {\n        if (v == null) { started = false; prevY = null; return; }\n        const xx = X(i), yy = Y(v);\n        if (!started) { d += `M ${xx} ${yy} `; started = true; }\n        else { d += `L ${xx} ${prevY} L ${xx} ${yy} `; }\n        prevY = yy;\n      });\n      k.push(R('path', { key: 'p' + si, d, fill: 'none', stroke: s.color, strokeWidth: 2.5, strokeLinejoin: 'round', strokeLinecap: 'round' }));\n      s.values.forEach((v, i) => {\n        if (v == null) return;\n        const xx = X(i), yy = Y(v), isSel = sel && sel.chart === chartId && sel.si === si && sel.pi === i;\n        k.push(R('circle', { key: 'c' + si + '_' + i, cx: xx, cy: yy, r: isSel ? 5 : 3.2, fill: '#fff', stroke: s.color, strokeWidth: 2.5 }));\n        k.push(R('circle', { key: 'h' + si + '_' + i, cx: xx, cy: yy, r: 15, fill: 'transparent', style: { cursor: 'pointer' },\n          onMouseEnter: () => this.setState({ histSel: { chart: chartId, si, pi: i } }),\n          onClick: () => this.setState({ histSel: { chart: chartId, si, pi: i } }) }));\n      });\n    });\n    if (sel && sel.chart === chartId && series[sel.si] && series[sel.si].values[sel.pi] != null) {\n      const s = series[sel.si], v = s.values[sel.pi], xx = X(sel.pi), yy = Y(v);\n      k.push(R('line', { key: 'sl', x1: xx, y1: padT, x2: xx, y2: padT + plotH, stroke: s.color, strokeWidth: 1, strokeDasharray: '3 3', opacity: .5 }));\n      const line2 = s.plat + ' · ' + fmtV(v);\n      const bw = Math.max(104, line2.length * 7.2 + 22), bh = 40;\n      let bx = xx - bw / 2; bx = Math.max(padL, Math.min(bx, W - padR - bw)); const by = Math.max(2, yy - bh - 12);\n      k.push(R('rect', { key: 'tt', x: bx, y: by, width: bw, height: bh, rx: 8, fill: '#12140f' }));\n      k.push(R('text', { key: 't1', x: bx + bw / 2, y: by + 16, textAnchor: 'middle', fontSize: 10, fill: '#9aa197', fontFamily: 'Geist Mono, monospace' }, days[sel.pi]));\n      k.push(R('text', { key: 't2', x: bx + bw / 2, y: by + 31, textAnchor: 'middle', fontSize: 13, fontWeight: 700, fill: '#fff', fontFamily: 'Space Grotesk, sans-serif' }, line2));\n    }\n    return R('svg', { viewBox: `0 0 ${W} ${H}`, style: { width: '100%', height: 'auto', display: 'block', touchAction: 'manipulation' }, preserveAspectRatio: 'xMidYMid meet' }, k);\n  }\n\n  renderVals() {\n    const catState = this.state.catState;\n    const setCat = (s) => () => this.setState({ catState: s });\n    const platMap = {\n      'Méliuz':     { m: 'mz', bg: '#ff2d6b', fg: '#fff', note: 'Crédito no app · saque via Pix' },\n      'Cuponomia':  { m: 'cp', bg: '#0a66ff', fg: '#fff', note: 'Aprovação em até 60 dias' },\n      'MyCashback': { m: 'my', bg: '#7c3aed', fg: '#fff', note: 'Resgate a partir de R$20' },\n      'PicPay':     { m: 'pp', bg: '#11c76f', fg: '#fff', note: 'Cashback na carteira PicPay' },\n      'Inter Shop': { m: 'in', bg: '#ff6a00', fg: '#fff', note: 'Direto na conta Inter' },\n      'Ame':        { m: 'am', bg: '#e60050', fg: '#fff', note: 'Saldo na Ame Digital' },\n    };\n    // Offer value: número = % simples; ou objeto { rate, rateInter?, boost?, until?, fixed?, currency? }\n    const DATA = [\n      { n: 'Amazon',      m: 'A', sc: '#ff9900', hist: true, provs: { 'Cuponomia': { rate: 9, boost: true, until: '12/07' }, 'Méliuz': { rate: 6.5, stale: true }, 'Inter Shop': { rate: 3.5, rateInter: 8 }, 'MyCashback': 4, 'Ame': { fixed: 15, currency: 'R$' } } },\n      { n: 'Shopee',      m: 'S', sc: '#ee4d2d', hist: true, provs: { 'Cuponomia': { rate: 12, prev: 14 }, 'Méliuz': 10, 'PicPay': 8, 'Ame': 6 } },\n      { n: 'Magalu',      m: 'M', sc: '#0086ff', hist: true, provs: { 'Méliuz': 8, 'Inter Shop': { rate: 4, rateInter: 9 }, 'Ame': 7, 'Cuponomia': 6.5 } },\n      { n: 'AliExpress',  m: 'A', sc: '#e62e04', hist: true, provs: { 'MyCashback': 9, 'Méliuz': 7.5, 'Cuponomia': 6, 'Inter Shop': { rate: 4, rateInter: 7.5 } } },\n      { n: 'Netshoes',    m: 'N', sc: '#1a1a1a', hist: true, provs: { 'Cuponomia': { rate: 7.5, boost: true, until: '15/07' }, 'Méliuz': 6, 'Inter Shop': 5 } },\n      { n: 'Centauro',    m: 'C', sc: '#ff5a00', noLogo: true, provs: { 'Méliuz': 6, 'PicPay': 5, 'Cuponomia': 4.5 } },\n      { n: 'Booking',     m: 'B', sc: '#003580', histR: true, provs: { 'Ame': { fixed: 25, currency: 'R$' }, 'Méliuz': { fixed: 18, currency: 'R$' } } },\n      { n: 'Nike',        m: 'N', sc: '#111111', hist: true, provs: { 'Cuponomia': { rate: 10, prev: 12 }, 'Méliuz': 8, 'MyCashback': 6, 'Ame': 5 } },\n      { n: 'Havan',       m: 'H', sc: '#0a3d91', noOffers: true, provs: {} },\n      { n: 'Casas Bahia', m: 'C', sc: '#e30613', hist: true, provs: { 'Ame': 8.5, 'Méliuz': 7, 'Cuponomia': 5 } },\n      { n: 'Mercado Livre', m: 'M', sc: '#ffe600', fgDark: true, provs: { 'Méliuz': 5, 'Cuponomia': { rate: 4, boost: true, until: ágina de plataformas (agregada de todas as lojas, sobre valores efetivos em %)\n    const agg = {};\n    DATA.forEach(d => Object.entries(d.provs).forEach(([p, raw]) => {\n      const o = resolve(p, raw, false); // base, sem preferência Inter\n      if (o.fixed) return; // valor fixo não entra na média de %\n      const rec = (agg[p] = agg[p] || { vals: [], cond: false, interVals: [] });\n      rec.vals.push(o.eff);\n      if (o.cond && typeof raw === 'object' && raw.rateInter != null) { rec.cond = true; rec.interVals.push(raw.rateInter); }\n    }));\n    const platforms = Object.entries(agg).map(([p, rec]) => {\n      const b = platMap[p];\n      const arr = rec.vals;\n      const avg = arr.reduce((a, c) => a + c, 0) / arr.length;\n      const baseMax = Math.max(...arr);\n      const interMax = rec.interVals.length ? Math.max(...rec.interVals) : baseMax;\n      const isInter = rec.cond;\n      return {\n        p, m: b.m, bg: b.bg, fg: b.fg, note: b.note, stores: arr.length,\n        avg: fmt(Math.round(avg * 10) / 10),\n        max: (isInter ? 'Até ' : '') + fmt(isInter ? interMax : baseMax),\n        maxLabel: isInter ? 'pico · para correntistas' : 'pico',\n        isInter,\n      };\n    }).sort((a, b) => b.stores - a.stores);\n\n    const faqs = [\n      { q: 'Quem paga o cashback?', a: 'Quem paga são as plataformas de cashback (Méliuz, Cuponomia, MyCashback e outras), não o farejô. Elas recebem uma comissão da loja por indicar sua compra e repassam parte a você. O farejô apenas mostra qual delas paga mais e te leva até lá.' },\n      { q: 'O farejô cobra alguma coisa?', a: 'Não. O farejô é gratuito para você. Comparamos as ofertas das plataformas e não adicionamos nenhuma taxa.' },\n      { q: 'Por que o cashback muda entre as plataformas?', a: 'Cada plataforma negocia sua própria comissão com a loja e decide quanto repassa. Por isso a mesma loja pode pagar percentuais diferentes em cada plataforma — é exatamente o que o farejô compara.' },\n      { q: 'Como eu recebo o cashback?', a: 'O crédito acontece dentro da plataforma que você escolheu (via Pix, saldo na carteira ou conta), seguindo as regras dela — inclusive prazos de aprovação. O farejô não intermedia o pagamento.' },\n      { q: 'Os percentuais são garantidos?', a: 'São informativos e podem variar por categoria de produto, campanhas e condições de cada plataforma. Sempre confirme o valor na plataforma antes de finalizar a compra.' },\n      { q: 'Preciso criar conta no farejô?', a: 'Não. Você compara e ativa direto, sem cadastro no farejô. O cadastro necessário é o da plataforma de cashback escolhida, para receber o valor.' },\n    ];\n    const go = (view) => () => this.setState({ view });\n    return {\n      isHome: this.state.view === 'home',\n      isStore: this.state.view === 'store',\n      isPlatforms: this.state.view === 'platforms',\n      isHow: this.state.view === 'how',\n      isFaq: this.state.view === 'faq',\n      query: this.state.query,\n      homeStores,\n      noResults: homeStores.length === 0,\n      resultsLabel: q ? (total + ' resultado' + (total === 1 ? '' : 's')) : 'Todas as lojas',\n      sortOpts,\n      showPager: !q && total > pageSize,\n      pages,\n      prev: prevOff ? () => {} : goPage(page - 1),\n      next: nextOff ? () => {} : goPage(page + 1),\n      prevColor: prevOff ? '#c4c1b7' : '#3d4039',\n      prevBorder: prevOff ? '1px solid #eeece5' : '1px solid #e0ddd4',\n      prevCursor: prevOff ? 'default' : 'pointer',\n      nextColor: nextOff ? '#c4c1b7' : '#3d4039',\n      nextBorder: nextOff ? '1px solid #eeece5' : '1px solid #e0ddd4',\n      nextCursor: nextOff ? 'default' : 'pointer',\n      clearSearch: () => this.setState({ query: '', page: 1 }),\n      catLoading: catState === 'loading',\n      catError: catState === 'error',\n      catDown: catState === 'down',\n      catOk: catState === 'ok',\n      skeleton: [0, 1, 2, 3, 4, 5],\n      retry: () => this.loadCatalog(),\n      catStates: [\n        { label: 'Normal', key: 'ok' },\n        { label: 'Carregando', key: 'loading' },\n        { label: 'Erro', key: 'error' },\n        { label: 'Indisponível', key: 'down' },\n      ].map(c => ({ label: c.label, onClick: setCat(c.key), bg: catState === c.key ? '#eef0ea' : 'transparent', fg: catState === c.key ? '#0d100e' : '#9aa197', border: catState === c.key ? '#eef0ea' : 'rgba(255,255,255,.14)' })),\n      cur, steps, platforms, faqs,\n      hasOffers: !cur.noOffers,\n      hasHist,\n      hasAnyHist,\n      noHist: !hasAnyHist,\n      hasHistR,\n      chartPct: hasHist ? this.buildChart('pct', histSeries, histDays, null) : null,\n      chartReais: hasHistR ? this.buildChart('reais', histRSeries, histDays, 'R$') : null,\n      histLegend: histSeries.map(s => ({ plat: s.plat, color: s.color })),\n      histRLegend: histRSeries.map(s => ({ plat: s.plat, color: s.color })),\n      histSummary,\n      histRSummary,\n      year: new Date().getFullYear(),\n      goHome: go('home'),\n      goPlatforms: go('platforms'),\n      goHow: go('how'),\n      goFaq: go('faq'),\n      onSearch: (e) => this.setState({ query: e.target.value, page: 1 }),\n      inter,\n      toggleInter: () => this.setState(s => {\n        const v = !s.inter;\n        try { localStorage.setItem('farejo_inter', v ? '1' : '0'); } catch (e) {}\n        return { inter: v };\n      }),\n      togBg: inter ? '#1c7a4d' : '#d8d5cc',\n      togX: inter ? '19px' : '3px',\n      togText: inter ? '#1c7a4d' : '#8a8f84',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
