name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase stack
        run: supabase start

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Install Chromium for browser smoke tests
        run: pnpm --filter @farejo/web exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test
