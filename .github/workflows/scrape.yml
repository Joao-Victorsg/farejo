name: Scrape cashback

on:
  schedule:
    # Dois ticks sem sobreposição: full/active rodam às 03h e 18h UTC; tail só às 03h.
    - cron: "0 3 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Plataforma e escopo para reexecução ad hoc
        required: true
        default: all
        type: choice
        options:
          - all
          - inter
          - zoom
          - mycashback
          - cuponomia-active
          - cuponomia-tail
          - meliuz-active
          - meliuz-tail

permissions:
  actions: read
  contents: read

jobs:
  inter:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'inter' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-inter
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: inter
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  zoom:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'zoom' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-zoom
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: zoom
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  mycashback:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'mycashback' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-mycashback
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: mycashback
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  cuponomia-active:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'cuponomia-active' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: scrape-cuponomia
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: cuponomia
      SCRAPE_TIER: active
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  cuponomia-tail:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') || inputs.target == 'all' || inputs.target == 'cuponomia-tail' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: scrape-cuponomia
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: cuponomia
      SCRAPE_TIER: tail
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  meliuz-active:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'meliuz-active' }}
    runs-on: ubuntu-latest
    timeout-minutes: 80
    concurrency:
      group: scrape-meliuz
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: meliuz
      SCRAPE_TIER: active
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  meliuz-tail:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *') || inputs.target == 'all' || inputs.target == 'meliuz-tail' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: scrape-meliuz
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SCRAPE_PLATFORM: meliuz
      SCRAPE_TIER: tail
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  summary:
    needs: [inter, zoom, mycashback, cuponomia-active, cuponomia-tail, meliuz-active, meliuz-tail]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read workflow start time
        id: workflow-start
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          started_at="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.run_started_at')"
          echo "started_at=${started_at}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_STARTED_AT: ${{ steps.workflow-start.outputs.started_at }}
          JOB_RESULTS_JSON: ${{ toJSON(needs) }}
