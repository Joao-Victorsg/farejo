name: Scrape cashback

on:
  schedule:
    # Dois ticks sem sobreposição: full/active rodam às 02h53 e 18h UTC; tail só às 02h53.
    # 02h53 UTC = 23h53 BRT (nominal). O agendador do GitHub só dispara ATRASADO, nunca
    # adiantado, e nessa janela o atraso medido é consistente (~1h); adiantar o alvo puxa o
    # início real para perto da madrugada BRT. O minuto :53 ainda tira do topo-de-hora
    # (pico global de crons), onde o atraso é pior. Continua best-effort: medir alguns dias.
    - cron: "53 2 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Plataforma e escopo para reexecução ad hoc
        required: true
        default: all
        type: choice
        options:
          - all
          - inter
          - zoom
          - mycashback
          - cuponomia-active
          - cuponomia-tail
          - meliuz-active
          - meliuz-tail

permissions:
  actions: read
  contents: read

jobs:
  inter:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'inter' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-inter
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: inter
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  zoom:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'zoom' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-zoom
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: zoom
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  mycashback:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'mycashback' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: scrape-mycashback
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: mycashback
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  cuponomia-active:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'cuponomia-active' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: scrape-cuponomia
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: cuponomia
      SCRAPE_TIER: active
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  cuponomia-tail:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '53 2 * * *') || inputs.target == 'all' || inputs.target == 'cuponomia-tail' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: scrape-cuponomia
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: cuponomia
      SCRAPE_TIER: tail
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture public Webfones response
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'cuponomia-tail' }}
        shell: bash
        run: |
          mkdir -p .artifacts/cuponomia-webfones
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { writeFile } from "node:fs/promises";

          const directory = ".artifacts/cuponomia-webfones";
          const url = "https://www.cuponomia.com.br/desconto/webfones";
          try {
            const response = await fetch(url, {
              headers: {
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
                "Accept-Language": "pt-BR,pt;q=0.9,en;q=0.8",
                Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
                Referer: "https://www.cuponomia.com.br/desconto",
                "Sec-Fetch-Dest": "document",
                "Sec-Fetch-Mode": "navigate",
                "Sec-Fetch-Site": "same-origin",
                "Upgrade-Insecure-Requests": "1",
              },
            });
            const html = await response.text();
            const metadata = {
              capturedAt: new Date().toISOString(),
              status: response.status,
              finalUrl: response.url || url,
              contentType: response.headers.get("content-type"),
              contentLength: response.headers.get("content-length"),
              bytes: Buffer.byteLength(html),
              sha256: createHash("sha256").update(html).digest("hex"),
              hasStoreHeader: /class=["'][^"']*store_header/u.test(html),
            };
            await writeFile(`${directory}/webfones.html`, html, "utf8");
            await writeFile(`${directory}/webfones-metadata.json`, `${JSON.stringify(metadata, null, 2)}\n`, "utf8");
            console.log(JSON.stringify(metadata));
          } catch (error) {
            const metadata = { capturedAt: new Date().toISOString(), error: error instanceof Error ? error.message : String(error) };
            await writeFile(`${directory}/webfones-metadata.json`, `${JSON.stringify(metadata, null, 2)}\n`, "utf8");
            console.warn(JSON.stringify(metadata));
          }
          NODE
      - name: Upload Webfones capture
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'cuponomia-tail' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cuponomia-webfones-${{ github.run_id }}
          path: .artifacts/cuponomia-webfones
          if-no-files-found: warn
          retention-days: 7
      - run: pnpm --filter @farejo/scraper scrape

  meliuz-active:
    if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == 'meliuz-active' }}
    runs-on: ubuntu-latest
    timeout-minutes: 80
    concurrency:
      group: scrape-meliuz
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: meliuz
      SCRAPE_TIER: active
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  meliuz-tail:
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '53 2 * * *') || inputs.target == 'all' || inputs.target == 'meliuz-tail' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: scrape-meliuz
      cancel-in-progress: false
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CATALOG_INVALIDATION_URL: ${{ secrets.CATALOG_INVALIDATION_URL }}
      CATALOG_INVALIDATION_SECRET: ${{ secrets.CATALOG_INVALIDATION_SECRET }}
      SCRAPE_PLATFORM: meliuz
      SCRAPE_TIER: tail
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper scrape

  summary:
    needs: [inter, zoom, mycashback, cuponomia-active, cuponomia-tail, meliuz-active, meliuz-tail]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read workflow start time
        id: workflow-start
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          started_at="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.run_started_at')"
          echo "started_at=${started_at}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @farejo/scraper summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_STARTED_AT: ${{ steps.workflow-start.outputs.started_at }}
          JOB_RESULTS_JSON: ${{ toJSON(needs) }}
