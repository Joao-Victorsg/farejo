name: Update e2e snapshots

# Temporary maintenance workflow: regenerates the Playwright visual baselines on the same
# Linux runner the deploy gate uses, then uploads them as an artifact to commit by hand.
# Mirrors ci.yml's setup exactly (same Supabase CLI + local stack the e2e suite expects).

on:
  workflow_dispatch:

concurrency:
  group: update-snapshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start local Supabase stack
        run: supabase start

      - name: Build
        run: pnpm build

      - name: Install Chromium
        run: pnpm --filter @farejo/web exec playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: pnpm --filter @farejo/web exec playwright test --update-snapshots

      - name: Upload regenerated snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-snapshots
          path: apps/web/e2e/**/*.png
          if-no-files-found: error
