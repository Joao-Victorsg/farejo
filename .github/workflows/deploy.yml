name: Deploy production

# F3/T18 (#64, ADR-0041): único caminho de publicação. O auto-deploy da integração Git da
# Vercel para `master` fica desabilitado por `apps/web/vercel.json` (`git.deploymentEnabled`);
# só este workflow publica em produção, e sempre na ordem migration -> verificação -> deploy do
# artefato já construído -> smoke. Previews continuam fora deste workflow e sem banco remoto
# (ADR-0037) — só master aciona esta publicação.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # cancel-in-progress: false — uma publicação em andamento nunca é cancelada por outra; a
  # próxima fica na fila e roda depois, preservando a ordem migration -> deploy -> smoke.
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Falha rápido se o Environment "production" ainda não tem os secrets configurados —
      # pendência operacional (mesmo padrão do Environment "logos") — em vez de gastar os ~30 min
      # de testes/build abaixo só para bloquear na migration de qualquer forma. Os secrets NÃO
      # são env de job: `pnpm test` abaixo builda e sobe a app localmente com dados fictícios, e
      # se `FAREJO_CATALOG_INVALIDATION_SECRET` de produção vazasse para esse passo, o teste local
      # usaria o segredo errado — cada passo declara só o que usa.
      # `FAREJO_SITE_URL` saiu daqui na ADR-0056: o smoke passou a mirar a URL do deployment
      # encenado, e o domínio público só é lido pela app em runtime (env var da Vercel). Guardar
      # aqui um secret que nenhum passo lê faria o deploy falhar por uma exigência inexistente.
      - name: Guard production secrets
        env:
          FAREJO_DEPLOY_DATABASE_URL: ${{ secrets.FAREJO_DEPLOY_DATABASE_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          FAREJO_CATALOG_INVALIDATION_SECRET: ${{ secrets.FAREJO_CATALOG_INVALIDATION_SECRET }}
          FAREJO_SUPABASE_CA_CERT: ${{ secrets.FAREJO_SUPABASE_CA_CERT }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          missing=()
          [ -z "$FAREJO_DEPLOY_DATABASE_URL" ] && missing+=("FAREJO_DEPLOY_DATABASE_URL")
          [ -z "$VERCEL_TOKEN" ] && missing+=("VERCEL_TOKEN")
          [ -z "$VERCEL_ORG_ID" ] && missing+=("VERCEL_ORG_ID")
          [ -z "$VERCEL_PROJECT_ID" ] && missing+=("VERCEL_PROJECT_ID")
          [ -z "$FAREJO_CATALOG_INVALIDATION_SECRET" ] && missing+=("FAREJO_CATALOG_INVALIDATION_SECRET")
          [ -z "$FAREJO_SUPABASE_CA_CERT" ] && missing+=("FAREJO_SUPABASE_CA_CERT")
          [ -z "$VERCEL_AUTOMATION_BYPASS_SECRET" ] && missing+=("VERCEL_AUTOMATION_BYPASS_SECRET")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::GitHub Environment \"production\" está sem os secrets: ${missing[*]}. Pendência operacional (mesmo padrão do Environment \"logos\"); publicação bloqueada até serem configurados."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      # ADR-0041 passo 1: testes, typecheck e build com as versões fixadas pelo monorepo, antes
      # de qualquer coisa tocar produção. Usa o Supabase local — nunca o de produção.
      - name: Start local Supabase stack
        run: supabase start

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Install Chromium for browser smoke tests
        run: pnpm --filter @farejo/web exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

      # ADR-0041 passos 2-3: migrations aditivas contra o Postgres de produção, depois
      # verificação de que o estado materializado bate com o que as migrations mescladas
      # declaram. Falha em qualquer um dos dois bloqueia o deploy — nada abaixo roda.
      - name: Apply production migrations
        env:
          FAREJO_DEPLOY_DATABASE_URL: ${{ secrets.FAREJO_DEPLOY_DATABASE_URL }}
        run: supabase db push --db-url "$FAREJO_DEPLOY_DATABASE_URL" --yes

      - name: Verify production schema
        env:
          FAREJO_DEPLOY_DATABASE_URL: ${{ secrets.FAREJO_DEPLOY_DATABASE_URL }}
          # ADR-0055: o certificado do Postgres do Supabase não encadeia até uma CA pública,
          # então toda conexão `pg` precisa do CA do projeto. O `supabase db push` acima não
          # usa isto — a CLI traz o próprio trust store.
          FAREJO_SUPABASE_CA_CERT: ${{ secrets.FAREJO_SUPABASE_CA_CERT }}
        run: pnpm --filter @farejo/db-audit verify:schema

      # ADR-0041 passo 4: `vercel build` roda aqui, no mesmo job, sobre o mesmo checkout que
      # acabou de passar em typecheck/build/test — não é o auto-deploy da Vercel reconstruindo
      # de forma independente (esse fica desabilitado por `apps/web/vercel.json`). `--prebuilt`
      # faz `vercel deploy` publicar exatamente esse artefato, sem a Vercel rodar um segundo
      # build remoto divergente. `vercel pull`/`build` leem VERCEL_ORG_ID e VERCEL_PROJECT_ID do
      # ambiente.
      # Vercel CLI monorepo requirement (see https://vercel.com/docs/monorepos#add-a-monorepo-through-vercel-cli):
      # "Vercel CLI should not be invoked from the subdirectory" — it must run from the repo root
      # so it can see the full workspace (pnpm-hoisted node_modules included), letting the
      # project's own "Root Directory" setting (apps/web) tell it which app to build/deploy.
      # Running it from apps/web while Root Directory is also apps/web makes the CLI look for
      # apps/web/apps/web; running it from the root while Root Directory is empty builds apps/web
      # as if it were a standalone package, missing monorepo-hoisted deps at deploy time. The
      # `vercel` binary itself is only a devDependency of apps/web, so it's invoked by path rather
      # than `pnpm exec` (which resolves bins relative to the package that declares the dep).
      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: apps/web/node_modules/.bin/vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: apps/web/node_modules/.bin/vercel build --prod --token="$VERCEL_TOKEN"

      # ADR-0056: `--skip-domain` cria o deployment de produção SEM mover o domínio. Produção
      # continua servindo o artefato anterior enquanto o smoke roda contra o novo, e só uma
      # publicação aprovada chega ao público. Substitui o desenho deploy->smoke->rollback, que
      # expunha o artefato não verificado e dependia de um rollback que o plano gratuito da
      # Vercel recusa depois do primeiro passo (HTTP 402).
      - name: Deploy prebuilt artifact (staged, no domain)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          url=$(apps/web/node_modules/.bin/vercel deploy --prebuilt --prod --skip-domain --token="$VERCEL_TOKEN")
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # ADR-0041 passo 5, corrigido pela ADR-0056: o alvo é a URL do deployment recém-criado, e
      # NUNCA o domínio de produção. Testar o domínio media o artefato antigo sempre que ele
      # estivesse fixado (por rollback ou promoção pendente) — o smoke aprovava ou reprovava algo
      # que não era o que acabou de ser publicado.
      - name: Smoke test the staged deployment
        id: smoke
        env:
          FAREJO_SITE_URL: ${{ steps.deploy.outputs.url }}
          FAREJO_CATALOG_INVALIDATION_SECRET: ${{ secrets.FAREJO_CATALOG_INVALIDATION_SECRET }}
          # A Deployment Protection responde 302 para URLs de deployment; só o domínio de
          # produção é público. Sem este bypass o smoke mede a tela de login, não o site.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter @farejo/web test:smoke:production

      # Complemento de browser ao passo acima, contra o MESMO deployment encenado. O passo HTTP
      # não alcança hidratação: o toggle de correntista é cliente puro (localStorage), então o
      # HTML servido é idêntico com ou sem JavaScript funcionando. Verificado localmente servindo
      # o site com os chunks JS respondendo 404 — o smoke HTTP passou 60/60 e este reprovou.
      # O Chromium já foi instalado acima para os testes de e2e; nenhum setup novo.
      - name: Smoke test the staged deployment (browser)
        env:
          FAREJO_SITE_URL: ${{ steps.deploy.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: pnpm --filter @farejo/web test:smoke:production:browser

      # Só aqui o público passa a ver o artefato novo. Falha em qualquer passo acima deixa a
      # produção intacta no deployment anterior — não há o que reverter, e as migrations aditivas
      # permanecem compatíveis com ele (ADR-0041).
      - name: Promote to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: apps/web/node_modules/.bin/vercel promote "${{ steps.deploy.outputs.url }}" --token="$VERCEL_TOKEN" --yes
